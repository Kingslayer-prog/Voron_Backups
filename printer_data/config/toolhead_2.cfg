# This file contains common pin mappings for the BIGTREETECH EBBCan
# Canbus board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB0/PB1)".
# The "EBB Can" micro-controller will be used to control the components on the nozzle.
# 9b94718bf056
# See docs/Config_Reference.md for a description of parameters.

[mcu et2]
canbus_uuid: 0d460fb980d9
canbus_interface: can0

[extruder2]
step_pin: et2: PD0
dir_pin: !et2: PD1
enable_pin: !et2: PD2
gear_ratio: 50:10
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 22.67895 #6.37617 #7.71 #4.5 #31.416-10tooth #22-8tooth  #8-stock
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: et2: PB13
sensor_type: Generic 3950
sensor_pin: et2: PA3
control = pid
pid_kp = 33.830
pid_ki = 2.623
pid_kd = 109.100
min_temp: 0
max_temp: 300
max_power: 1.0
min_extrude_temp: 170
pressure_advance: 0.05
pressure_advance_smooth_time: 0.040
max_extrude_cross_section: 5

[tmc2209 extruder2]
uart_pin: et2:PA15
run_current: 0.4
hold_current: 0.2
sense_resistor: 0.110
driver_TPOWERDOWN: 20
stealthchop_threshold: 999999

[fan_generic T2_partfan]
pin: et2: PA1         #PF8 for CPAP
max_power: 1
shutdown_speed: 0
cycle_time: 0.01
hardware_pwm: False
kick_start_time: 0.150
off_below: 0.05

[heater_fan T2_hotend_fan]
pin: et2: PA0
max_power: 1.0
fan_speed: 1.0
kick_start_time: 0
heater: extruder2
heater_temp: 80.0

[adxl345 T2]
 cs_pin: et2:PB12
 spi_software_sclk_pin: et2:PB10
 spi_software_mosi_pin: et2:PB11
 spi_software_miso_pin: et2:PB2
 axes_map: x,z,y

[gcode_macro T2]
variable_color: ""
gcode:
  SELECT_TOOL T=2

[tool T2]
tool_number: 2
extruder: extruder2
fan: T2_partfan
gcode_x_offset: 0.593750
gcode_y_offset: 0.487500
gcode_z_offset: -1.361250

params_park_x: 136.00 #139.60
params_park_y: -2.00 #-0.25
params_park_z: 297.00

params_input_shaper_freq_x: 126.4
params_input_shaper_type_x: 'EI'
params_input_shaper_freq_y: 72.8
params_input_shaper_type_y: '3HUMP_EI'

[tool_probe T2]
pin: ^et2: PB9
Tool: 2
z_offset: -2.625 #-2.240
speed: 3.0
samples: 4
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.02
samples_tolerance_retries: 3
activate_gcode:
    _TAP_PROBE_ACTIVATE HEATER=extruder2

# change the neopixel section name to the tool you are configuring:
# T0, T1, etc.
[neopixel T2_leds]
pin: et2: PD3
color_order: GRB
chain_count: 3
initial_RED: 0
initial_GREEN: 0
initial_BLUE: 1

# change the gcode_macro section name to the tool you are configuring:
# T0, T1, etc.
[gcode_macro T2]
variable_active: 0 # Must be zero.
variable_color: "" # Leave empty
gcode:
    SELECT_TOOL T=2 # change to the index of the tool. 0, 1, 2, etc.