##########################################################################################################
# G32
##########################################################################################################

[gcode_macro G32]
gcode:
    SET_PIN PIN=caselight VALUE=1
    STATUS_HEATING
    M190 S60 # Set and wait for bed to reach temperature for Tap
    M109 S150 # Set and wait for nozzle to reach temperature
    BED_MESH_CLEAR
    STATUS_HOMING
    G28.1
    STATUS_LEVELING
    QUAD_GANTRY_LEVEL
    CLEAN_NOZZLE
    STATUS_HOMING
    G28.1
    BED_MESH_PROFILE LOAD="default"
    STATUS_READY

##########################################################################################################
# ACTIVE_TOOL
##########################################################################################################

[gcode_macro ACTIVE_TOOL]
variable_tool: 0
gcode: