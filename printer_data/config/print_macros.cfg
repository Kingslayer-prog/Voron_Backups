##########################################################################################################
# PRINT_START
##########################################################################################################

[gcode_macro PRINT_START]
gcode:
  INITIALIZE_THE_TOOLCHANGER
  # This part fetches data from your slicer. Such as bed, extruder, and chamber temps and size of your printer.
  {% set target_bed = params.BED|int %}
  #{% set target_extruder = params.EXTRUDER|int %}
  {% set target_extruder = params.TOOL_TEMP|int %}
  {% set target_tool = params.TOOL|int %}
  {% set target_chamber = params.CHAMBER|int %}
  {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
  {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}

 # Turn off all the leds and filament runout sensors of the tools that are not used
 # {% for tool_nr in printer.toolchanger.tool_numbers %}
 #   {% set tooltemp_param = 'T' ~ tool_nr|string ~ '_TEMP' %}
 #   {% set tool_filament_runout_sensor = 'T' ~ tool_nr|string ~ '_filament_runout_1' %}
 #   {% if tooltemp_param in params %}
 #     STATUS_READY T={tool_nr}
 #     SET_FILAMENT_SENSOR SENSOR={encoder_sensor_t} ENABLE=1
 #   {% else %}
 #     STATUS_OFF T={tool_nr}
 #     SET_FILAMENT_SENSOR SENSOR={tool_filament_runout_sensor} ENABLE=0
 #   {% endif %}
 # {% endfor %}

## Set print temps ----------------------------------------------
#    RESPOND TYPE=echo MSG='Set Print Temps...'
#    {% if "T0_TEMP" in params %}
#        M104 T0 S{ params.T0_TEMP }                         # If T0 is used, set it to print temp
#        SET_GCODE_VARIABLE  MACRO=T0  VARIABLE=print_temp  VALUE={params.T0_TEMP}
#    {% else %}
#        M104 T0 S0                                          # Else, turn T0 off
#    {% endif %}
#    {% if "T1_TEMP" in params %}
#        M104 T1 S{ params.T1_TEMP }                         # If T1 is used, set it to print temp
#        SET_GCODE_VARIABLE  MACRO=T1  VARIABLE=print_temp  VALUE={params.T1_TEMP}
#    {% endif %}
#    {% if "T2_TEMP" in params %}
#        M104 T2 S{ params.T2_TEMP }                         # If T2 is used, set it to print temp
#        SET_GCODE_VARIABLE  MACRO=T2 VARIABLE=print_temp  VALUE={params.T2_TEMP}
#    {% endif %}
#    {% if "T3_TEMP" in params %}
#        M104 T3 S{ params.T3_TEMP }                         # If T3 is used, set it to print temp
#        SET_GCODE_VARIABLE  MACRO=T3  VARIABLE=print_temp  VALUE={params.T3_TEMP}
#    {% endif %}
  STATUS_HOMING                                         # Set LEDs to homing-mode
  G0 Z5 
  SMARTHOME                                                   # Auto home
  G90                                                   ; use absolute coordinates
  #BED_MESH_CLEAR                                        # Clear the old bed mesh
  
# Check if the bed temp is higher than 90c - if so then trigger a heatsoak.
  {% if params.BED|int > 90 %}
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"           # Display info on display
    STATUS_HEATING                                      # Set LEDs to heating-mode
    M190 S{target_bed}                                  # Set the target temp for the bed
    SET_DISPLAY_TEXT MSG="Heatsoak: {target_chamber}c"  # Display info on display
    M191 S{target_chamber}                              # Set the target temp for the chamber
    G1 X{x_wait} Y{y_wait} Z15 F3000                    # Go to center of the bed
    
    
# If the bed temp is not over 90c, then skip the heatsoak and just heat up to set temp with a 5 min soak
  {% else %}
    SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"           # Display info on display
    STATUS_HEATING                                      # Set LEDs to heating-mode
    G1 X{x_wait} Y{y_wait} Z15 F9000                    # Go to center of the bed
    M190 S{target_bed}                                  # Set the target temp for the bed
    M141 S{target_chamber}
    SET_DISPLAY_TEXT MSG="Stabilizing temperature"      # Display info on display
  {% endif %}

# Heat hotend to 150c. This helps with getting a correct Z-home.
  SELECT_TOOL T={target_tool}
  SET_DISPLAY_TEXT MSG="Hotend: 150c"                   # Display info on display
  M109 S150                                             # Heat hotend to 150c

##  V2.4 Quad gantry level AKA QGL
  SET_DISPLAY_TEXT MSG="Leveling"                       # Display info on display
  #STATUS_LEVELING                                       # Set LEDs to leveling-mode
  Clean_Nozzle                                            # Run the clean nozzle macro
  {% if printer.configfile.settings.quad_gantry_level %}
            {% if printer.quad_gantry_level.applied == False %}
                QUAD_GANTRY_LEVEL
            {% endif %}
  {% endif %}                                      # Level the printer via QGL
  G28 Z                                                 # Home Z again after QGL

  ##  bed mesh 2 of 2 for bed mesh
  SET_DISPLAY_TEXT MSG="Bed mesh"                       # Display info on display
  #STATUS_MESHING                                        # Set LEDs to bed mesh-mode
  BED_MESH_PROFILE LOAD=default
  #BED_MESH_CALIBRATE ADAPTIVE=1                         # Start the bed mesh (add ADAPTIVE=1) for adaptive bed mesh
  
# Heat up the hotend up to target via data from slicer
  SET_DISPLAY_TEXT MSG="Hotend: {target_extruder}c"     # Display info on display
  #STATUS_HEATING                                        # Set LEDs to heating-mode
  G1 X{x_wait} Y{y_wait} Z25 F9000                      # Go to center of the bed
  M107                                                  # Turn off partcooling fan
  M109 S{target_extruder}                               # Heat the hotend to set temp
  
  G92 E0                                                ; avoid extrude only too long errors 
  Clean_Nozzle                                            # Run the clean nozzle macro
  #G0 X241 Y321 F10000                                   # Move to x-100 before where cura starts the print to get ready for purge line
  #G0 Z0 F10000                                          # Touch build plate to avoid oozing
  SET_DISPLAY_TEXT MSG="Voron go brrrrrr"                    # Display info on display
  #STATUS_PRINTING                                       # Set LEDs to printing-mode
  LINE_PURGE                                            # Purge line, ends where cura starts the print
  G91                                                   # Realative positioning                                     
  G0 Z2                                                 # Move nozzle 2mm up
  G90                                                   # Absolute positioning

##########################################################################################################
# PRINT_END
##########################################################################################################

[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
gcode:
    # safe anti-stringing move coords
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}
    
    SAVE_GCODE_STATE NAME=STATE_PRINT_END
    
    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-2.0 F1800                 ; retract filament
    
    TURN_OFF_HEATERS
    
    G90                                      ; absolute positioning
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000  ; move nozzle to remove stringing
    G0 X175 Y340 F3600  ;{th.axis_maximum.x//2} Y{th.axis_maximum.y - 2} park nozzle at rear
    M107                                     ; turn off fan
    SET_STEPPER_ENABLE STEPPER=extruder ENABLE=0
    #M18 E                                    #Disable E stepper (testing).................................................................<<<<<<<<<<<<<<<<<<<<<<<<<<<<<
    #BED_MESH_CLEAR
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END
    SET_DISPLAY_TEXT MSG="All Done, Enjoy"

##########################################################################################################
# SMARTHOME
##########################################################################################################

[gcode_macro SMARTHOME]
gcode:
    {% if printer.toolhead.homed_axes == "xyz" %}
        M118 Printer is already homed
    {% else %}
        M118 Printer needs homed...
        G28
    {% endif %}

##########################################################################################################
# CALIBRATE_PROBE_Z_OFFSET
##########################################################################################################

[gcode_macro CALIBRATE_PROBE_Z_OFFSET]
gcode:
    PROBE_CALIBRATE

##########################################################################################################
# INITIALIZE_THE_TOOLCHANGER
##########################################################################################################

[gcode_macro INITIALIZE_THE_TOOLCHANGER]
gcode:
    INITIALIZE_TOOLCHANGER

##########################################################################################################
# NUDGE_MOVE_OVER_PROBE
##########################################################################################################

[gcode_macro NUDGE_MOVE_OVER_PROBE]
gcode:
  G0 Z8
  # Put your specific values here!
  # Update them too, after the first run.
  G0 X220.475 F15000
  G0 Y343.268750 F15000

##########################################################################################################
# NUDGE_FIND_TOOL_OFFSET
##########################################################################################################

[gcode_macro NUDGE_FIND_TOOL_OFFSET]
gcode:
  NUDGE_MOVE_OVER_PROBE
  TOOL_LOCATE_SENSOR

##########################################################################################################
# NUDGE_FIND_TOOL_OFFSETS
##########################################################################################################

[gcode_macro NUDGE_FIND_TOOL_OFFSETS]
gcode:
    T0
    #M109 T0 S150  # Heat up as much as possible without oozing to account for any thermal deformations
    NUDGE_FIND_TOOL_OFFSET
    M104 T0 S0
    # Match your number of tools:
    #   [1, 2, 3] for a 4-head toolchanger.
    #   [1] for IDEX or Dual Gantry.
    {% for tool in [2, 4] %}
        T{tool}
        #M109 T{tool} S150
        NUDGE_MOVE_OVER_PROBE
        TOOL_CALIBRATE_TOOL_OFFSET
        M104 T{tool} S0
    {% endfor %}

##########################################################################################################
# PARK
##########################################################################################################

[gcode_macro PARK]
gcode:
    SMART_PARK
    #{% set th = printer.toolhead %}
    #G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y//2} Z30  

##########################################################################################################
# Clean_Nozzle
##########################################################################################################
  
[gcode_macro Clean_Nozzle]
#   Clean nozzle
gcode:
    G90                                                 # Absolute positioning
	G1 X133 Y345 Z10 F7000
	M106 S255                                             # Set part fan speed too 100% for nozzle cleaning
    G1  Z0.7 F7000
	G1  X133 Y345  F18000
	G1  X65 Y338  F18000
	G1  X133 Y338  F18000
	G1  X65 Y345  F18000
	G1  X133 Y345  F18000
    G1  X65 Y338  F18000
	G1  X133 Y338  F18000
	G1  X65 Y345  F18000
	G1  X133 Y345  F18000
    G1  X65 Y338  F18000
	G1  X133 Y338  F18000
	G1  X65 Y345  F18000
	G1  X133 Y345  F18000
    G1  X65 Y338  F18000
	G1  X133 Y338  F18000
	G1  X65 Y345  F18000
	G1  X133 Y345  F18000 
	G1  X65 Y338  F18000
	G1  X133 Y338  F18000
    G1  X65 Y345  F18000
    G1  X133 Y345  F18000
    G1  X175 Y310  F18000
    G1  Z10 F7000
    M107                                                  # Turn off partcooling fan
##########################################################################################################
# NO_TOOL
##########################################################################################################

[gcode_macro NO_TOOL]
#   Move into postition of the middle of the bed
gcode:
    G91                            ; absolute positioning
	G1 Y50 F800
    G1 Z2 F800

##########################################################################################################
# SW_Nozzle
##########################################################################################################
    
[gcode_macro SW_Nozzle]
#   Clean nozzle
gcode:
    G90                            ; absolute positioning
	M104 S230
    G28.1
    M109 S230
    G1 F200 E-20
    G1  x175 y175 z100 F3000

##########################################################################################################
# Purge_Nozzle
##########################################################################################################

[gcode_macro Purge_Nozzle]
#   Purge nozzle
gcode:
    G90                            ; absolute positioning
	G1 X137 Y350 Z15 F3000
    G1  Z5 F3000
	G1 E15 F150
	G1 E-2 F750
	Clean_Nozz

##########################################################################################################
# Move_Into_Pos
##########################################################################################################

[gcode_macro Move_Into_Pos]
#   Move into postition of the middle of the bed
gcode:
    G90                            ; absolute positioning
	G1 X175 Y175 Z15 F3000
    G1  Z5 F3000
    
##########################################################################################################
# TOOL_HEAD_FRONT
##########################################################################################################

[gcode_macro TOOL_HEAD_FRONT]
gcode:
    G1 X175 Y-5.00 Z60 F15000

##########################################################################################################
# LOAD_FILAMENT
##########################################################################################################

[gcode_macro LOAD_FILAMENT]
variable_load_distance:  70
variable_purge_distance:  10
gcode:
    {% set speed = params.SPEED|default(150) %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 60 %}
    SAVE_GCODE_STATE NAME=load_state
    G91
    G92 E0
    G1 E{load_distance} F{max_velocity} # fast-load
    G1 E{purge_distance} F{speed} # purge
    RESTORE_GCODE_STATE NAME=load_state

##########################################################################################################
# UNLOAD_FILAMENT
##########################################################################################################
    
[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance:  70
variable_purge_distance:  0
gcode:
    {% set speed = params.SPEED|default(150) %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 60 %}
    SAVE_GCODE_STATE NAME=unload_state
    G91
    G92 E0
    G1 E{purge_distance} F{speed} # purge
    G1 E-{unload_distance} F{max_velocity} # fast-unload
    RESTORE_GCODE_STATE NAME=unload_state
# Home, get position, throw around toolhead, home again.
# If MCU stepper positions (first line in GET_POSITION) are greater than a full step different (your number of microsteps), then skipping occured.
# We only measure to a full step to accomodate for endstop variance.
# Example: TEST_SPEED SPEED=300 ACCEL=5000 ITERATIONS=10

# In order to use this you need to increase max_extrude_cross_section in your extruder config or klipper will complain. I set mine to 30

##########################################################################################################
# PURGE_BLOB
##########################################################################################################

[gcode_macro PURGE_BLOB]
gcode:
    # This is for a 300mm bed. If you have a diferent bed size you may want to adjust the line below
    {% set rand_pos = (105 + ( printer.system_stats.cputime * 1000 ) % 60) %}           ; Generate pseudo random start pos so we dont wear out that one spot on the bed. 
    M117 Purging at X{ rand_pos }                                                       
    
    # The start pos will be within the "handle" of the flex plate where there is some extra Y space available so we can go all the way to Y0
    # If your setup does not have this extra space then just increase the y valie in the line "G1 X{ rand_pos } Y0 Z1 F18000"
    G92 E0                          ; zero the extruder
    G90                             ; absolute positioning
    G1 X{ rand_pos } Y0 Z1 F18000   ; Go to start pos for perge line
    G1 Z0.4 F600                    ; Lower to purge height
    G91                             ; relative positioning
    G1 X5 E40 F40                   ; Extrude blob of filament on the bed
    M106 P0                         ; Enable Cooling Fan
    G1 X20 Z5 F100                  ; Slow drag away from the blob with fans helping cool and break strings. Also raiz z zo the blob clears the fan duct
    G1 X5  Z-5.1 F9000              ; Now that the blob has cleared the duct we go back down for a short 0.3mm height extrusion
    G1 X5 E2 F180                   ; Slow 5mm extrude move to help with stringing
    G1 X30 E-1 F6000                ; Fast move and retract to break strings and reduce ooze
    G1 Z1 F100                      ; Lift
    M106 P0 S0                      ; Disable Cooling Fan
    G92 E0                          ; zero the extruder
    G90                             ; absolute positioning

##########################################################################################################
# UNSAFE_MOVE
##########################################################################################################

[gcode_macro UNSAFE_MOVE_TOOL]
description: Move the toolhead without homing
gcode:
    {% set z = params.Z|default(0)|float %}
    {% set x = params.X|default(0)|float %}
    {% set y = params.Y|default(0)|float %}
    {% set f = params.F|default(10)|float %}
    G90
    SET_KINEMATIC_POSITION Z={(printer.toolhead.axis_maximum.z/2)} X={(printer.toolhead.axis_maximum.x/2)} Y={(printer.toolhead.axis_maximum.y/2)}
    G0 X{(printer.toolhead.axis_maximum.x/2)+x} Y{(printer.toolhead.axis_maximum.y/2)+y} Z{(printer.toolhead.axis_maximum.z/2)+z} F{ (f*60) }
    M84

[gcode_macro UNSAFE_MOVE_Y1]
gcode:
    UNSAFE_MOVE_TOOL Y=-1

[gcode_macro UNSAFE_MOVE_Y10]
gcode:
    UNSAFE_MOVE_TOOL Y=-10
    
[gcode_macro UNSAFE_MOVE_X1]
gcode:
    UNSAFE_MOVE_TOOL X=1    

[gcode_macro UNSAFE_MOVE_X10]
gcode:
    UNSAFE_MOVE_TOOL X=10

[gcode_macro UNSAFE_MOVE_Z5]
gcode:
    UNSAFE_MOVE_TOOL Z=10
    UNSAFE_MOVE_TOOL Z1=10
    UNSAFE_MOVE_TOOL Z2=10
    UNSAFE_MOVE_TOOL Z3=10

[gcode_macro UNSAFE_MOVE_Z25]
gcode:
    UNSAFE_MOVE_TOOL Z=25
    UNSAFE_MOVE_TOOL Z1=25
    UNSAFE_MOVE_TOOL Z2=25
    UNSAFE_MOVE_TOOL Z3=25

##########################################################################################################
# M141
##########################################################################################################

[gcode_macro M141]
gcode:
  {% set TARGET_TEMP = params.S|default(0)|float %}
  SET_HEATER_TEMPERATURE HEATER=chamber TARGET={TARGET_TEMP}
  # Optional:  Add logic here to control fans or other elements
  # based on the TARGET_TEMP or other conditions. For example:
  #   {% if TARGET_TEMP > 50 %}
  #       SET_FAN_SPEED FAN=chamber_fan SPEED=1.0  # Turn on exhaust fan
  #   {% else %}
  #       SET_FAN_SPEED FAN=chamber_fan SPEED=0.0 # Turn off exhaust fan
  #   {% endif %}

