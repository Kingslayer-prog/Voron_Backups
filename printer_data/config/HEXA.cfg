#############################################################################################################
#
# Macro For Filament Encoder Runout
#
#############################################################################################################

[gcode_macro _FILAMENT_RUNOUT_CHECK]
gcode:
  {% set tool = params.TOOL|int %}
  {% set active_tool = printer["gcode_macro ACTIVE_TOOL"].tool|int %}
  {% if tool == active_tool %}
    M117 T{tool} filament encoder runout
#    PAUSE
  {% else %}
    M117 Ignored encoder runout on T{tool}
  {% endif %}

  [gcode_macro _FILAMENT_INSERT_CHECK]
gcode:
  {% set tool = params.TOOL|int %}
  {% set active_tool = printer["gcode_macro ACTIVE_TOOL"].tool|int %}
  {% if tool == active_tool %}
    M117 T{tool} filament encoder inserted
  {% endif %}

[gcode_macro _SFS_RUNOUT]
#description: Handle filament runout only if the reporting sensor matches the active tool
gcode:
    {% set triggered_tool = params.T|int %}
    {% set active_tool = printer.toolhead.extruder[-1]|int if printer.toolhead.extruder != 'extruder' else 0 %}
    
    {% if triggered_tool == active_tool %}
        M117 Filament runout detected on T{triggered_tool}!
#        PAUSE
    {% else %}
        M118 Ignoring runout on T{triggered_tool} (not active)
    {% endif %}


[gcode_macro _ENABLE_SFS]
description: Enable the filament sensor for a specific tool
gcode:
    {% set tool = params.T|default(0)|int %}
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor_t{tool} ENABLE=1


[gcode_macro _DISABLE_SFS]
description: Disable the filament sensor for a specific tool
gcode:
    {% set tool = params.T|default(0)|int %}
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor_t{tool} ENABLE=0


[gcode_macro _DISABLE_ALL_SFS]
description: Disable all filament sensors
gcode:
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor_t0 ENABLE=0
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor_t1 ENABLE=0
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor_t2 ENABLE=0
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor_t3 ENABLE=0
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor_t4 ENABLE=0
#    SET_FILAMENT_SENSOR SENSOR=encoder_sensor_t5 ENABLE=0


[gcode_macro _ENABLE_ALL_SFS]
description: Enable all filament sensors
gcode:
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor_t0 ENABLE=1
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor_t1 ENABLE=1
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor_t2 ENABLE=1
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor_t3 ENABLE=1
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor_t4 ENABLE=1
#    SET_FILAMENT_SENSOR SENSOR=encoder_sensor_t5 ENABLE=1
