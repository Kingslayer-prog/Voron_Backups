#
# BTT SFS V2 Filament Sensors for Toolchanger
#
#############################################################################################################

# Define a filament sensor for each toolhead
# Adjust pins to match your wiring

# =========================
# T0
# =========================

[filament_motion_sensor encoder_sensor_t0]
switch_pin: hexa:PC13
detection_length: 3.50
extruder: extruder
pause_on_runout: True
runout_gcode:
  _FILAMENT_RUNOUT_CHECK TOOL=0
insert_gcode:
  _FILAMENT_INSERT_CHECK TOOL=0
  
