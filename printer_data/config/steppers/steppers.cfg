#####################################################################
##                            X Axis
#####################################################################

[stepper_x]
step_pin: PE6                         # X-axis motor pulse pin setting
dir_pin: !PE5                         # X-axis motor direction pin setting
enable_pin: !PC14                     # X-axis motor enable pin setting
microsteps: 32                        # Motor microsteps setting
rotation_distance: 40                 
full_steps_per_rotation: 200          
endstop_pin: ^PD13 #tmc5160_stepper_x:virtual_endstop #^!PD12 #^!PF1 #tmc2209_stepper_x:virtual_endstop #^et0: PB6
position_min: -1
position_endstop: 346
position_max: 350
##--------------------------------------------------------------------
homing_speed: 50 #20
second_homing_speed: 2.5
homing_retract_dist: 5 #5
homing_positive_dir: true


[tmc5160 stepper_x]
cs_pin: PC13                         # Chip select pin
diag1_pin: ^!PF4                                              
spi_software_sclk_pin: PG8            # SPI clock pin
spi_software_mosi_pin: PG6            # SPI master out slave in pin
spi_software_miso_pin: PG7            # SPI master in slave out pin
spi_speed: 3500000
run_current: 2.0                      # Running current
sense_resistor: 0.022
interpolate: False                      # Interpolation
stealthchop_threshold: 0
#driver_SGT: 2 # -64 is most sensitive value, 63 is least sensitive
#driver_TBL: 2
#driver_TOFF: 4
#driver_HSTRT: 7
#driver_HEND: 9
#driver_TPFD: 0
#driver_MULTISTEP_FILT: True

[stepper_x1]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD6
microsteps: 32                        # Motor microsteps setting
rotation_distance: 40                 
full_steps_per_rotation: 200  
endstop_pin: ^PD13 

[tmc5160 stepper_x1]
cs_pin: PD5
diag1_pin: ^!PF0                     
spi_software_sclk_pin: PG8            # SPI clock pin
spi_software_mosi_pin: PG6            # SPI master out slave in pin
spi_software_miso_pin: PG7            # SPI master in slave out pin
spi_speed: 3500000
run_current: 2.0
stealthchop_threshold: 0
sense_resistor: 0.022
interpolate: False
#driver_SGT: 0
#driver_TBL: 2
#driver_TOFF: 4
#driver_HSTRT: 7
#driver_HEND: 9
#driver_TPFD: 0
driver_MULTISTEP_FILT: True

#####################################################################
##                            Y Axis
#####################################################################

[stepper_y]
step_pin: PE2                         # Y1-axis motor pulse pin setting
dir_pin: !PE1                         # Y1-axis motor direction pin setting
enable_pin: !PE4                      # Y1-axis motor enable pin setting
microsteps: 32                        # Motor microsteps setting
rotation_distance: 40                 
full_steps_per_rotation: 200          
endstop_pin: ^PD12 #tmc5160_stepper_y:virtual_endstop #^!PD13 #^!PF0 #tmc2209_stepper_y:virtual_endstop #^PF2
position_min: -1
position_endstop: 350
position_max: 350

##--------------------------------------------------------------------
homing_speed: 50 #20 #9#MAX 100
second_homing_speed: 2.5
homing_retract_dist: 5 #5
homing_positive_dir: true

[tmc5160 stepper_y]
cs_pin: PE3                           # Chip select pin
diag1_pin: ^!PF3                      # This is the endstop diag pin
spi_speed: 3500000
spi_software_sclk_pin: PG8            # SPI clock pin
spi_software_mosi_pin: PG6            # SPI master out slave in pin
spi_software_miso_pin: PG7            # SPI master in slave out pin
run_current: 2.0                     # Running current
sense_resistor: 0.022
interpolate: False                     # Interpolation
stealthchop_threshold: 0
#driver_SGT: 1 # -64 is most sensitive value, 63 is least sensitive
#driver_TBL: 2
#driver_TOFF: 4
#driver_HSTRT: 7
#driver_HEND: 9
#driver_TPFD: 0
driver_MULTISTEP_FILT: True

[stepper_y1]
step_pin: PC7
dir_pin: !PC8
enable_pin: !PD2
microsteps: 32                        # Motor microsteps setting
rotation_distance: 40                 
full_steps_per_rotation: 200  
endstop_pin: ^PD12 

[tmc5160 stepper_y1]
cs_pin: PC6
spi_software_sclk_pin: PG8            # SPI clock pin
spi_software_mosi_pin: PG6            # SPI master out slave in pin
spi_software_miso_pin: PG7            # SPI master in slave out pin
spi_speed: 3500000
run_current: 2.0
stealthchop_threshold: 0
sense_resistor: 0.022
diag1_pin: !PC15
interpolate: False
#driver_SGT: 3
#driver_TBL: 2
#driver_TOFF: 4
#driver_HSTRT: 7
#driver_HEND: 9
#driver_TPFD: 0
driver_MULTISTEP_FILT: True

#####################################################################
# 	Z Stepper Settings
#####################################################################

## Z0 Stepper - (Front Left on MOTOR3)
[stepper_z]
step_pin: PB8
dir_pin: PB7
enable_pin: !PE0
microsteps: 32
rotation_distance: 40
gear_ratio: 80:16
endstop_pin: probe:z_virtual_endstop
position_max: 300

##--------------------------------------------------------------------
position_min: -5
homing_speed: 12 #5
second_homing_speed: 2

[tmc5160 stepper_z]
cs_pin: PB9                           # Chip select pin
#diag1_pin: ^!PF2                      # This is the endstop diag pin
spi_speed: 3500000
spi_software_sclk_pin: PG8            # SPI clock pin
spi_software_mosi_pin: PG6            # SPI master out slave in pin
spi_software_miso_pin: PG7            # SPI master in slave out pin
run_current: 1.0                      # Running current
sense_resistor: 0.022
interpolate: False                      # Interpolation
stealthchop_threshold: 999999

