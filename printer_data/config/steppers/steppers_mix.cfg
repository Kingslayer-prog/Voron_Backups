#####################################################################
##                            X Axis
#####################################################################

[stepper_x]
step_pin: PE6                         # X-axis motor pulse pin setting
dir_pin: !PE5                         # X-axis motor direction pin setting
enable_pin: !PC14                     # X-axis motor enable pin setting
microsteps: 32                        # Motor microsteps setting
rotation_distance: 40                 
full_steps_per_rotation: 200          
#setting (X-)
endstop_pin: tmc5160_stepper_x:virtual_endstop #^!PD12 #^!PF1 #tmc2209_stepper_x:virtual_endstop #^et0: PB6
position_min: -1
position_endstop: 350 #345.85 #347.85
position_max: 350

##--------------------------------------------------------------------
homing_speed: 90 #20
#second_homing_speed: 2.5
homing_retract_dist: 0 #5
homing_positive_dir: true


[tmc5160 stepper_x]
cs_pin: PC13                         # Chip select pin
diag1_pin: ^!PF4                                              
spi_software_sclk_pin: PG8            # SPI clock pin
spi_software_mosi_pin: PG6            # SPI master out slave in pin
spi_software_miso_pin: PG7            # SPI master in slave out pin
spi_speed: 3500000
#driver_TPFD: 0                        # Driver setting
run_current: 1.2                      # Running current
#hold_current: 0.6
sense_resistor: 0.022
interpolate: False                     # Interpolation
stealthchop_threshold: 0
driver_SGT: 2

#####################################################################
##                            Y Axis
#####################################################################

[stepper_y]
step_pin: PE2                         # Y1-axis motor pulse pin setting
dir_pin: !PE1                         # Y1-axis motor direction pin setting
enable_pin: !PE4                      # Y1-axis motor enable pin setting
microsteps: 32                        # Motor microsteps setting
rotation_distance: 40                 
full_steps_per_rotation: 200          
endstop_pin: tmc5160_stepper_y:virtual_endstop #^!PD13 #^!PF0 #tmc2209_stepper_y:virtual_endstop #^PF2
position_min: -10
position_endstop: 350 #341.50 #344
position_max: 350

##--------------------------------------------------------------------
homing_speed: 90 #20 #9#MAX 100
#second_homing_speed: 2.5
homing_retract_dist: 0 #5
homing_positive_dir: True

[tmc5160 stepper_y]
cs_pin: PE3                           # Chip select pin
diag1_pin: ^!PF3                      # This is the endstop diag pin
spi_speed: 3500000
spi_software_sclk_pin: PG8            # SPI clock pin
spi_software_mosi_pin: PG6            # SPI master out slave in pin
spi_software_miso_pin: PG7            # SPI master in slave out pin
#driver_TPFD: 0                        # Driver setting
run_current: 1.2                     # Running current
#hold_current: 0.6
sense_resistor: 0.022
interpolate: False                     # Interpolation
stealthchop_threshold: 0
driver_SGT: 1

#####################################################################
# 	Z Stepper Settings
#####################################################################

## Z0 Stepper - (Front Left on MOTOR3)
[stepper_z]
step_pin: PB8
dir_pin: PB7
enable_pin: !PE0
microsteps: 32
rotation_distance: 40
gear_ratio: 80:16
#endstop_pin: ^PF2
#endstop_pin: ^PF5 
endstop_pin: probe:z_virtual_endstop
position_max: 310

##--------------------------------------------------------------------
position_min: -5
homing_speed: 12 #5
second_homing_speed: 2

[tmc2209 stepper_z]
uart_pin: PB9
interpolate: True
run_current: 1.4
hold_current: 0.4
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################

##	Z1 Stepper - (Rear Left on Motor4)
[stepper_z1]
step_pin: PB4
dir_pin: !PB3
enable_pin: !PB6
#endstop_pin: ^PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##--------------------------------------------------------------------
[tmc2209 stepper_z1]
uart_pin: PB5
interpolate: True
run_current: 1.4
hold_current: 0.4
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################

##	Z2 Stepper - (Rear Right on Motor5)
[stepper_z2]
step_pin: PG13
dir_pin: PG12
enable_pin: !PG15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##--------------------------------------------------------------------
[tmc2209 stepper_z2]
uart_pin: PG14
interpolate: True
run_current: 1.4
hold_current: 0.4
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################

##	Z3 Stepper - (Front Right on Motor6)
[stepper_z3]
step_pin: PG9
dir_pin: !PD7
enable_pin: !PG11
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##--------------------------------------------------------------------
[tmc2209 stepper_z3]
uart_pin: PG10
interpolate: True
run_current: 1.4
hold_current: 0.4
sense_resistor: 0.110
stealthchop_threshold: 0 #999999

