#####################################################################
# 	X/Y Stepper
#####################################################################

## X Stepper - (Rear Left on MOTOR1)
[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 32
rotation_distance: 40
endstop_pin:  ^!PF1 #tmc2209_stepper_x:virtual_endstop #^et0: PB6
position_min: -1
position_endstop: 345.85 #347.85
position_max: 350

##--------------------------------------------------------------------
homing_speed: 75 #20
second_homing_speed: 2.5
homing_retract_dist: 5 #5
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PC13
interpolate: true
run_current: 1.7
hold_current: 0.4
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^PF4
driver_SGTHRS: 40 # 255 is most sensitive value, 0 is least sensitive

#####################################################################

## Y Stepper - (Rear Right on MOTOR2)
[stepper_y]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 32

rotation_distance: 40

endstop_pin: ^!PF0 #tmc2209_stepper_y:virtual_endstop #^PF2
position_min: -10
position_endstop: 341.50 #344
position_max: 350

##--------------------------------------------------------------------
homing_speed: 75 #20 #9#MAX 100
second_homing_speed: 2.5
homing_retract_dist: 5 #5
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PE3
interpolate: true
run_current: 1.7
hold_current: 0.4
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^PF3
driver_SGTHRS: 57 # 255 is most sensitive value, 0 is least sensitive

#####################################################################
# 	Z Stepper Settings
#####################################################################

## Z0 Stepper - (Front Left on MOTOR3)
[stepper_z]
step_pin: PB8
dir_pin: PB7
enable_pin: !PE0
microsteps: 32
rotation_distance: 40
gear_ratio: 80:16
#endstop_pin: ^PF2
#endstop_pin: ^PF5 
endstop_pin: probe:z_virtual_endstop
position_max: 310

##--------------------------------------------------------------------
position_min: -5
homing_speed: 12 #5
second_homing_speed: 2

[tmc2209 stepper_z]
uart_pin: PB9
interpolate: True
run_current: 1.6
hold_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################

##	Z1 Stepper - (Rear Left on Motor4)
[stepper_z1]
step_pin: PB4
dir_pin: !PB3
enable_pin: !PB6
#endstop_pin: ^PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##--------------------------------------------------------------------
[tmc2209 stepper_z1]
uart_pin: PB5
interpolate: True
run_current: 1.6
hold_current: 0.4
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################

##	Z2 Stepper - (Rear Right on Motor5)
[stepper_z2]
step_pin: PG13
dir_pin: PG12
enable_pin: !PG15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##--------------------------------------------------------------------
[tmc2209 stepper_z2]
uart_pin: PG14
interpolate: True
run_current: 1.6
hold_current: 0.4
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################

##	Z3 Stepper - (Front Right on Motor6)
[stepper_z3]
step_pin: PG9
dir_pin: !PD7
enable_pin: !PG11
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##--------------------------------------------------------------------
[tmc2209 stepper_z3]
uart_pin: PG10
interpolate: True
run_current: 1.6
hold_current: 0.4
sense_resistor: 0.110
stealthchop_threshold: 0 #999999

#####################################################################