# This file contains common pin mappings for the BIGTREETECH EBBCan
# Canbus board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB0/PB1)".
# The "EBB Can" micro-controller will be used to control the components on the nozzle.
# 9b94718bf056
# See docs/Config_Reference.md for a description of parameters.

[mcu et1]
canbus_uuid: bbfe3f457c9b
canbus_interface: can0

[extruder1]
step_pin: et1: PD0
dir_pin: et1: PD1
enable_pin: !et1: PD2
gear_ratio: 50:10 #50:10
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 22.67895 #4.5 #31.416-10tooth #22-8tooth  #8-stock
nozzle_diameter: 0.600
filament_diameter: 1.750
heater_pin: et1: PB13
sensor_type: Generic 3950
sensor_pin: et1: PA3
control = pid
pid_kp = 22.954
pid_ki = 1.889
pid_kd = 69.723
min_temp: -110
max_temp: 300
max_power: 1.0
min_extrude_temp: 170
pressure_advance: 0.05
pressure_advance_smooth_time: 0.040
max_extrude_cross_section: 5

[tmc2209 extruder1]
uart_pin: et1:PA15
run_current: 0.4
hold_current: 0.2
sense_resistor: 0.110
driver_TPOWERDOWN: 20
stealthchop_threshold: 999999

[fan_generic T1_partfan]
pin: et1: PA1         #PF8 for CPAP
max_power: 1
shutdown_speed: 0
cycle_time: 0.01
hardware_pwm: False
kick_start_time: 0.150
off_below: 0.05

[heater_fan T1_hotend_fan]
pin: et1: PA0
max_power: 1.0
fan_speed: 0.4
kick_start_time: 0
heater: extruder1
heater_temp: 80.0

[adxl345 T1]
 cs_pin: et1:PB12
 spi_software_sclk_pin: et1:PB10
 spi_software_mosi_pin: et1:PB11
 spi_software_miso_pin: et1:PB2
 axes_map: x,z,y

[gcode_macro T1]
variable_color: ""
gcode:
  SELECT_TOOL T=1

[tool T1]
tool_number: 1
extruder: extruder1
fan: T1_partfan
gcode_x_offset: -0.009375
gcode_y_offset: 0.603125
gcode_z_offset: -0.706250

params_park_x: 67.40 #68.35
params_park_y: -2.20 #1.70
params_park_z: 298.0

params_input_shaper_freq_x: 79.4
params_input_shaper_type_x: 'MZV'
params_input_shaper_freq_y: 83.4
params_input_shaper_type_y: 'EI'

params_input_shaper_damping_ratio_x: 0.040
params_input_shaper_damping_ratio_y: 0.018

[tool_probe T1]
pin: ^et1: PB9
Tool: 1
z_offset: -1.775 #-2.600 Last Moved Down
speed: 3.0
samples: 5
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.02
samples_tolerance_retries: 3
activate_gcode:
    _TAP_PROBE_ACTIVATE HEATER=extruder1

# change the neopixel section name to the tool you are configuring:
# T0, T1, etc.
[neopixel T1_leds]
pin: et1: PD3
color_order: GRB
chain_count: 3
initial_RED: 0
initial_GREEN: 1
initial_BLUE: 0

# change the gcode_macro section name to the tool you are configuring:
# T0, T1, etc.
[gcode_macro T1]
variable_active: 0 # Must be zero.
variable_color: "" # Leave empty
gcode:
    SELECT_TOOL T=1 # change to the index of the tool. 0, 1, 2, etc.
    # ... your existing pickup/docking logic ...
    _DISABLE_ALL_SFS          ; Prevent false triggers during change
    # ... tool change happens ...
    #_ENABLE_SFS T=1           ; Enable only the new tool's sensor