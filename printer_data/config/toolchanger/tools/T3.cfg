# This file contains common pin mappings for the BIGTREETECH EBBCan
# Canbus board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB0/PB1)".
# The "EBB Can" micro-controller will be used to control the components on the nozzle.
# 9b94718bf056
# See docs/Config_Reference.md for a description of parameters.

[mcu et3]
canbus_uuid: 2ddd5af63564 #aa29d0cba991 #2ddd5af63564
canbus_interface: can0

[extruder3]
step_pin: et3: PD0
dir_pin: !et3: PD1
enable_pin: !et3: PD2
gear_ratio: 50:8
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 22.47 #6.37617 #7.71 #4.5 #31.416-10tooth #22-8tooth  #8-stock
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: et3: PB13
sensor_type: Generic 3950
sensor_pin: et3: PA3
control = pid
pid_kp = 18.227
pid_ki = 0.942
pid_kd = 88.170
min_temp: 0
max_temp: 300
max_power: 1.0
min_extrude_temp: 170
pressure_advance: 0.05
pressure_advance_smooth_time: 0.040
max_extrude_cross_section: 10

[tmc2209 extruder3]
uart_pin: et3:PA15
run_current: 0.4
hold_current: 0.2
sense_resistor: 0.110
driver_TPOWERDOWN: 20
stealthchop_threshold: 999999

[fan_generic T3_partfan]
pin: et3: PA2         #PF8 for CPAP
max_power: 1
shutdown_speed: 0
cycle_time: 0.01
hardware_pwm: False
kick_start_time: 0.150
off_below: 0.05

[heater_fan T3_hotend_fan]
pin: et3: PA0
max_power: 1.0
fan_speed:0.60
kick_start_time: 0
heater: extruder3
heater_temp: 80.0

[adxl345 T3]
 cs_pin: et3:PB12
 spi_software_sclk_pin: et3:PB10
 spi_software_mosi_pin: et3:PB11
 spi_software_miso_pin: et3:PB2
 axes_map: x,z,y

[gcode_macro T3]
variable_color: ""
gcode:
  SELECT_TOOL T=3

[tool T3]
tool_number: 3
extruder: extruder3
fan: T3_partfan
gcode_x_offset: 0.703125
gcode_y_offset: 0.300000
gcode_z_offset: -1.288750

params_park_x: 207.40 #208.90
params_park_y: -1.30 #-1.85
params_park_z: 300.21 #297.50

params_input_shaper_freq_x: 81.4
params_input_shaper_type_x: 'MZV'
params_input_shaper_freq_y: 118.2
params_input_shaper_type_y: '3HUMP_EI'

params_input_shaper_damping_ratio_x: 0.033
params_input_shaper_damping_ratio_y: 0.076

[tool_probe T3]
pin: ^et3: PB9
Tool: 3
z_offset: -1.650
speed: 3.0
samples: 5
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.02
samples_tolerance_retries: 3
activate_gcode:
    _TAP_PROBE_ACTIVATE HEATER=extruder3

# change the neopixel section name to the tool you are configuring:
# T0, T1, etc.
[neopixel T3_leds]
pin: et3: PD3
color_order: GRB
chain_count: 3
initial_RED: 0
initial_GREEN: 1
initial_BLUE: 1

# change the gcode_macro section name to the tool you are configuring:
# T0, T1, etc.
[gcode_macro T3]
variable_active: 0 # Must be zero.
variable_color: "" # Leave empty
gcode:
    SELECT_TOOL T=3 # change to the index of the tool. 0, 1, 2, etc.
    # ... your existing pickup/docking logic ...
    _DISABLE_ALL_SFS          ; Prevent false triggers during change
    # ... tool change happens ...
    #_ENABLE_SFS T=3           ; Enable only the new tool's sensor