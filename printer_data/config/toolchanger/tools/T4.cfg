# This file contains common pin mappings for the BIGTREETECH EBBCan
# Canbus board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB0/PB1)".
# The "EBB Can" micro-controller will be used to control the components on the nozzle.
# 9b94718bf056
# See docs/Config_Reference.md for a description of parameters.

[mcu et4]
canbus_uuid: 6b70aa5fa163 #aa29d0cba991
canbus_interface: can0

[extruder4]
step_pin: et4: PD0
dir_pin: !et4: PD1
enable_pin: !et4: PD2
gear_ratio: 50:8
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 22.47 #6.37617 #7.71 #4.5 #31.416-10tooth #22-8tooth  #8-stock
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: et4: PB13
sensor_type: Generic 3950
sensor_pin: et4: PA3
control = pid
pid_kp = 18.227
pid_ki = 0.942
pid_kd = 88.170
min_temp: 0
max_temp: 300
max_power: 1.0
min_extrude_temp: 170
pressure_advance: 0.05
pressure_advance_smooth_time: 0.040
max_extrude_cross_section: 5

[tmc2209 extruder4]
uart_pin: et4:PA15
run_current: 0.4
hold_current: 0.2
sense_resistor: 0.110
driver_TPOWERDOWN: 20
stealthchop_threshold: 999999

[fan_generic T4_partfan]
pin: et4: PA1         #PF8 for CPAP
max_power: 1
shutdown_speed: 0
cycle_time: 0.01
hardware_pwm: False
kick_start_time: 0.150
off_below: 0.05

[heater_fan T4_hotend_fan]
pin: et4: PA0
max_power: 1.0
fan_speed:1.0
kick_start_time: 0
heater: extruder4
heater_temp: 80.0

[adxl345 T4]
 cs_pin: et4:PB12
 spi_software_sclk_pin: et4:PB10
 spi_software_mosi_pin: et4:PB11
 spi_software_miso_pin: et4:PB2
 axes_map: x,z,y

[gcode_macro T4]
variable_color: ""
gcode:
  SELECT_TOOL T=4

[tool T4]
tool_number: 4
extruder: extruder4
fan: T4_partfan
gcode_x_offset: 0.553125
gcode_y_offset: 0.071875
gcode_z_offset: -0.165000

params_park_x: 275.45
params_park_y: -1.87
params_park_z: 297.00

params_input_shaper_freq_x: 126.4
params_input_shaper_type_x: 'EI'
params_input_shaper_freq_y: 72.8
params_input_shaper_type_y: '3HUMP_EI'

[tool_probe T4]
pin: ^et4: PB9
Tool: 4
z_offset: -0.700
speed: 3.0
samples: 5
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.02
samples_tolerance_retries: 3
activate_gcode:
    _TAP_PROBE_ACTIVATE HEATER=extruder4

# change the neopixel section name to the tool you are configuring:
# T0, T1, etc.
[neopixel T4_leds]
pin: et4: PB8 #PD3
color_order: WRGB
chain_count: 3
initial_RED: 1
initial_GREEN: 0
initial_BLUE: 1
initial_WHITE: 0

# change the gcode_macro section name to the tool you are configuring:
# T0, T1, etc.
[gcode_macro T4]
variable_active: 0 # Must be zero.
variable_color: "" # Leave empty
gcode:
    SELECT_TOOL T=4 # change to the index of the tool. 0, 1, 2, etc.
    # ... your existing pickup/docking logic ...
    _DISABLE_ALL_SFS          ; Prevent false triggers during change
    # ... tool change happens ... 
    #_ENABLE_SFS T=4           ; Enable only the new tool's sensor