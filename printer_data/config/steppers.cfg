#####################################################################
# 	X/Y Stepper
#####################################################################

## X Stepper - (Rear Left on MOTOR1)
[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 32
rotation_distance: 40
endstop_pin: tmc2240_stepper_x:virtual_endstop #tmc2209_stepper_x:virtual_endstop #^et0: PB6
position_min: -1
position_endstop: 350
position_max: 351

##--------------------------------------------------------------------
homing_speed: 25 #20
homing_retract_dist: 0 #5
homing_positive_dir: true

[tmc2240 stepper_x]
cs_pin: PC13                          # Chip select pin
diag0_pin: ^!PF4                        # This forwards the virtual endstop to the actual endstop pin
driver_SGT: 1                       # -64 most sensitive and +64 least sensitive
spi_software_sclk_pin: PG8            # SPI clock pin
spi_software_mosi_pin: PG6            # SPI master out slave in pin
spi_software_miso_pin: PG7            # SPI master in slave out pin
driver_TPFD: 0                        # Driver setting
run_current: 1.5                      # Running current
interpolate: True                     # Interpolation

#[tmc2209 stepper_x]
#uart_pin: PC13
#interpolate: true
#run_current: 1.6
#sense_resistor: 0.110
#stealthchop_threshold: 0
#diag_pin: ^PF4
#driver_SGTHRS: 75 # 255 is most sensitive value, 0 is least sensitive

#####################################################################

## Y Stepper - (Rear Right on MOTOR2)
[stepper_y]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 32

rotation_distance: 40

endstop_pin: tmc2209_stepper_y:virtual_endstop #^PF2
position_min: -10
position_endstop: 350
position_max: 351

##--------------------------------------------------------------------
homing_speed: 25 #20 #9#MAX 100
homing_retract_dist: 0 #5
homing_positive_dir: true

[tmc2240 stepper_y1]
cs_pin: PE3 # Chip select pin
driver_SGT: 1
spi_software_sclk_pin: PG8 # SPI clock pin
spi_software_mosi_pin: PG6 # SPI master out slave in pin
spi_software_miso_pin: PG7 # SPI master in slave out pin
driver_TPFD: 0 # Driver setting
run_current: 1.5 # Running current
interpolate: True # Interpolation

#[tmc2209 stepper_y]
#uart_pin: PE3
#interpolate: true
#run_current: 1.6
#sense_resistor: 0.110
#stealthchop_threshold: 0
#diag_pin: ^PF3
#driver_SGTHRS: 65 # 255 is most sensitive value, 0 is least sensitive

#####################################################################
# 	Z Stepper Settings
#####################################################################

## Z0 Stepper - (Front Left on MOTOR3)
[stepper_z]
step_pin: PB8
dir_pin: PB7
enable_pin: !PE0
microsteps: 32
rotation_distance: 40
gear_ratio: 80:16
#endstop_pin: ^PF2
#endstop_pin: ^PF5 
endstop_pin: probe:z_virtual_endstop
position_max: 310

##--------------------------------------------------------------------
position_min: -5
homing_speed: 12 #5
second_homing_speed: 2

[tmc2209 stepper_z]
uart_pin: PB9
interpolate: True
run_current: 1.6 
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################

##	Z1 Stepper - (Rear Left on Motor4)
[stepper_z1]
step_pin: PB4
dir_pin: !PB3
enable_pin: !PB6
#endstop_pin: ^PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##--------------------------------------------------------------------

[tmc2240 stepper_z1]
cs_pin: PB5 # Chip select pin
spi_software_sclk_pin: PG8 # SPI clock pin
spi_software_mosi_pin: PG6 # SPI master out slave in pin
spi_software_miso_pin: PG7 # SPI master in slave out pin
driver_TPFD: 0 # Driver setting
run_current: 1.5 # Running current
interpolate: True # Interpolation

