#interpolate: True
#run_current: 1.6
#sense_resistor: 0.110
#stealthchop_threshold: 0

#####################################################################

##	Z2 Stepper - (Rear Right on Motor5)
[stepper_z2]
step_pin: PG13
dir_pin: PG12
enable_pin: !PG15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##--------------------------------------------------------------------
[tmc2209 stepper_z2]
uart_pin: PG14
interpolate: True
run_current: 1.6
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################

##	Z3 Stepper - (Front Right on Motor6)
[stepper_z3]
step_pin: PG9
dir_pin: !PD7
enable_pin: !PG11
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##--------------------------------------------------------------------
[tmc2209 stepper_z3]
uart_pin: PG10
interpolate: True
run_current: 1.6
