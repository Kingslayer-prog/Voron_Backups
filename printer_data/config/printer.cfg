#####################################################################
# 	Printer Physics
#####################################################################

[printer]
kinematics: corexy
max_velocity: 800 #450  
max_accel: 18000 #4000    			
max_z_velocity: 120 #40			
max_z_accel: 440 #400
square_corner_velocity: 4.0

[resonance_tester]
accel_chip: adxl345 T0
probe_points: 175,175,20
sweeping_accel: 400
sweeping_period: 0

[input_shaper]
damping_ratio_x: 0.036
damping_ratio_y: 0.076

[idle_timeout]
timeout: 2000

[bed_mesh]
speed: 500
horizontal_move_z: 4
mesh_min: 40, 40
mesh_max: 310,310
probe_count: 5, 5

#[firmware_retraction]
#retract_length: 0.5
#   The length of filament (in mm) to retract when G10 is activated,
#   and to unretract when G11 is activated (but see
#   unretract_extra_length below). The default is 0 mm.
#retract_speed: 45
#   The speed of retraction, in mm/s. The default is 20 mm/s.
#unretract_extra_length: 0.05
#   The length (in mm) of *additional* filament to add when
#   unretracting.
#unretract_speed: 40
#   The speed of unretraction, in mm/s. The default is 10 mm/s.


#####################################################################
# 	X/Y Stepper
#####################################################################

## X Stepper - (Rear Left on MOTOR1)
[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 32
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop #^et0: PB6
position_min: -1
position_endstop: 350
position_max: 351

##--------------------------------------------------------------------
homing_speed: 25 #20
homing_retract_dist: 0 #5
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PC13
interpolate: true
run_current: 1.6
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^PF4
driver_SGTHRS: 75 # 255 is most sensitive value, 0 is least sensitive

#####################################################################

## Y Stepper - (Rear Right on MOTOR2)
[stepper_y]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 32

rotation_distance: 40

endstop_pin: tmc2209_stepper_y:virtual_endstop #^PF2
position_min: -10
position_endstop: 350
position_max: 351

##--------------------------------------------------------------------
homing_speed: 25 #20 #9#MAX 100
homing_retract_dist: 0 #5
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PE3
interpolate: true
run_current: 1.6
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^PF3
driver_SGTHRS: 65 # 255 is most sensitive value, 0 is least sensitive

#####################################################################
# 	Z Stepper Settings
#####################################################################

## Z0 Stepper - (Front Left on MOTOR3)
[stepper_z]
step_pin: PB8
dir_pin: PB7
enable_pin: !PE0
microsteps: 32
rotation_distance: 40
gear_ratio: 80:16
#endstop_pin: ^PF2
#endstop_pin: ^PF5 
endstop_pin: probe:z_virtual_endstop
position_max: 310

##--------------------------------------------------------------------
position_min: -5
homing_speed: 12 #5
second_homing_speed: 2

[tmc2209 stepper_z]
uart_pin: PB9
interpolate: True
run_current: 1.6 
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################

##	Z1 Stepper - (Rear Left on Motor4)
[stepper_z1]
step_pin: PB4
dir_pin: !PB3
enable_pin: !PB6
#endstop_pin: ^PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##--------------------------------------------------------------------
[tmc2209 stepper_z1]
uart_pin: PB5
interpolate: True
run_current: 1.6
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################

##	Z2 Stepper - (Rear Right on Motor5)
[stepper_z2]
step_pin: PG13
dir_pin: PG12
enable_pin: !PG15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##--------------------------------------------------------------------
[tmc2209 stepper_z2]
uart_pin: PG14
interpolate: True
run_current: 1.6
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################

##	Z3 Stepper - (Front Right on Motor6)
[stepper_z3]
step_pin: PG9
dir_pin: !PD7
enable_pin: !PG11
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##--------------------------------------------------------------------
[tmc2209 stepper_z3]
uart_pin: PG10
interpolate: True
run_current: 1.6
sense_resistor: 0.110
stealthchop_threshold: 0 #999999

