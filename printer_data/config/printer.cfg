[multi_pin My_Many_Fans]
pins: PF7, PA0
#   A comma separated list of pins associated with this alias. This
#   parameter must be provided.

## Heated Chamber Fan
[heater_fan chamber_fan]
pin=multi_pin:My_Many_Fans #pin: PF7
max_power: 1.0
fan_speed: 0.9
kick_start_time: 0.5
heater: chamber
heater_temp: 75.0
shutdown_speed = 0

##[fan_generic soc-fan]
#pin: host:gpio79  #CB1
#pin: host:gpio26  #CM4

## Fan0
#[fan]
#pin: PF7

## Fan 1 - Mainboards And Stepper Cooling
[controller_fan controllerFan0]
pin: PF9
max_power: 0.5
fan_speed: 1
kick_start_time: 0
stepper: stepper_z
stepper: stepper_x

## Fan 2 - Mainboards And Stepper Cooling
[controller_fan controllerFan1]
pin: PF6
max_power: 0.5
fan_speed: 1
kick_start_time: 0
stepper: stepper_x

## Fan 3 - Mainboards And Stepper Cooling
[controller_fan controllerFan2]
pin: PF8
max_power: 1.0
fan_speed: 1
kick_start_time: 1
stepper: stepper_x

