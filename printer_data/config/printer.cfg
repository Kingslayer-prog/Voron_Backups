#fan_speed: 1.0
#kick_start_time: 0.5
#heater: extruder
#heater_temp: 50.0

[multi_pin My_Many_Fans]
pins: PF7, PA0
#   A comma separated list of pins associated with this alias. This
#   parameter must be provided.

## Heated Chamber Fan
[heater_fan chamber_fan]
pin=multi_pin:My_Many_Fans #pin: PF7
max_power: 1.0
fan_speed: 0.9
kick_start_time: 0.5
heater: chamber
heater_temp: 75.0
shutdown_speed = 0

##[fan_generic soc-fan]
#pin: host:gpio79  #CB1
#pin: host:gpio26  #CM4

## Fan0
#[fan]
#pin: PF7

## Fan 1 - Mainboards And Stepper Cooling
[controller_fan controllerFan0]
pin: PF9
max_power: 0.5
fan_speed: 1
kick_start_time: 0
stepper: stepper_z
stepper: stepper_x

## Fan 2 - Mainboards And Stepper Cooling
[controller_fan controllerFan1]
pin: PF6
max_power: 0.5
fan_speed: 1
kick_start_time: 0
stepper: stepper_x

## Fan 3 - Mainboards And Stepper Cooling
[controller_fan controllerFan2]
pin: PF8
max_power: 1.0
fan_speed: 1
kick_start_time: 1
stepper: stepper_x

## Fan3
#[heater_fan fan3]
#pin: PF8

## Fan4
#[heater_fan fan4]
#pin: PA4

## Fan5
#[heater_fan fan5]
#pin: PA6
#tachometer_pin: PC2

## Fan6
#[heater_fan fan6]
#pin: PA2
#tachometer_pin: PC1

#####################################################################
#   Heaters
#####################################################################

[heater_bed]
heater_pin: PA1
sensor_pin: PB1
sensor_type: ATC Semitec 104GT-2
min_temp: 0
max_temp: 135
control = pid
pid_kp=36.110
pid_ki=1.330
pid_kd=245.096

[heater_generic chamber]
heater_pin: PA5
sensor_type: Generic 3950
sensor_pin: PB0
control = pid
pid_Kp=7.889
pid_Ki=1.315
pid_Kd=11.834

max_power: 0.75
min_temp: 0
max_temp: 130

[verify_heater chamber]
max_error: 900
check_gain_time: 900
hysteresis: 5
heating_gain: 1

#####################################################################
#   LED Control
#####################################################################

## Chamber Lighting - HE2 Connector
[output_pin caselight]
pin: PA3
pwm:true
shutdown_value: 0
value:1
cycle_time: 0.01

#####################################################################
#   Homing and Gantry Adjustment Routines
#####################################################################

[quad_gantry_level]

##  Gantry Corners for 350mm Build
##  Uncomment for 350mm build
gantry_corners:
   -60,-10
   410,420
##  Probe points
points:
   50,25
   50,275
   300,275
   300,25

#gantry_corners:
#   -70,0 #-60,-10
#   410,410 #410,420

#points: #  Probe points
#   20,20
#   20,310
#   320,310
#   320,10

speed: 200
horizontal_move_z: 4
retries: 7
retry_tolerance: 0.015
max_adjust: 15

#####################################################################
# EXP1 / EXP2 (display) pins
#####################################################################

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE7, EXP1_2=PG1,
    EXP1_3=PG0, EXP1_4=PF15,
    EXP1_5=PF14, EXP1_6=PF13,    # Slot in the socket on this side
    EXP1_7=PF12, EXP1_8=PF11,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PE13, EXP2_2=PE12,
    EXP2_3=PE15, EXP2_4=PE11,
    EXP2_5=PE10, EXP2_6=PE14,      # Slot in the socket on this side
    EXP2_7=PE8, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<NC>

#####################################################################
#   Input Shaping and Resonance
##################################################################### 

[shaketune]

