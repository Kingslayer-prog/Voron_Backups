#   Clean nozzle
gcode:
    G90                                                 # Absolute positioning
	G1 X121 Y340 Z10 F7000
	M106 S255                                             # Set part fan speed too 100% for nozzle cleaning
    G1  Z0.7 F7000
	G1  X133 Y342  F18000
	G1  X65 Y338  F18000
	G1  X133 Y338  F18000
	G1  X65 Y342  F18000
	G1  X133 Y342  F18000
    G1  X65 Y338  F18000
	G1  X133 Y328  F18000
	G1  X65 Y342  F18000
	G1  X133 Y342  F18000
    G1  X65 Y338  F18000
	G1  X133 Y338  F18000
	G1  X65 Y342  F18000
	G1  X133 Y342  F18000
    G1  X65 Y338  F18000
	G1  X133 Y338  F18000
	G1  X65 Y342  F18000
	G1  X133 Y342  F18000 
	G1  X65 Y338  F18000
	G1  X133 Y338  F18000
    G1  X65 Y342  F18000
    G1  X175 Y342  F18000
    G1  X175 Y310  F18000
    G1  Z10 F7000
