[include plr.cfg]
[include mainsail.cfg]
[include steppers/steppers_include.cfg]
[include timelapse.cfg]
[include print_macros.cfg]
[include KAMP_Settings.cfg]
[include toolchanger/configs/toolchanger-include.cfg]
[include calibration_tools/calib-include.cfg]
[include leds/leds-include.cfg]
[include HEXA.cfg]

#[gcode_button ESTOP_BUTTON]
#pin: ^!PF0
#press_gcode:  
#    {action_emergency_stop("Impending Doom Averted!")}

[save_variables]
filename: ~/printer_data/config/variables.cfg

[input_shaper]

[rounded_path]
resolution: 0.2
replace_g0: False

[exclude_object]

[virtual_sdcard]
path: /home/pi/printer_data/gcodes

[display_status]

[pause_resume]

[force_move]
enable_force_move: True

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_090030000551313433343333-if00

[mcu CM5]
serial: /tmp/klipper_host_mcu

[temperature_sensor chamber_actual]
sensor_type: Generic 3950
sensor_pin: PC5

[temperature_sensor CM4]
sensor_type: temperature_host

[temperature_sensor Manta_M8P]
sensor_type: temperature_mcu
sensor_mcu: mcu

[shaketune]

#####################################################################
# 	Printer Physics
#####################################################################

[printer]
kinematics: corexy
max_velocity: 800 #800 #400  
max_accel: 25000 #30000 #4000    			
max_z_velocity: 220 #40			
max_z_accel: 600 #100
square_corner_velocity: 5.0

[resonance_tester]
accel_chip: adxl345 T0
probe_points: 175,175,20
sweeping_accel: 400
sweeping_period: 0

[idle_timeout]
timeout: 3600 #Time in seconds 3600 = 1 hour

[bed_mesh]
speed: 500
horizontal_move_z: 4
mesh_min: 40, 40
mesh_max: 310,310
probe_count: 6, 6
algorithm: lagrange
mesh_pps: 4, 4

[auto_speed]
axis: diag_x, diag_y  ; One or multiple of `x`, `y`, `diag_x`, `diag_y`, `z`

margin: 20            ; How far away from your axes to perform movements

settling_home: 1      ; Perform settling home before starting Auto Speed
max_missed: 5.0       ; Maximum full steps that can be missed
endstop_samples: 2    ; How many endstop samples to take for endstop variance

accel_min: 17000.0     ; Minimum acceleration test may try
accel_max: 50000.0    ; Maximum acceleration test may try
accel_accu: 0.05      ; Keep binary searching until the result is within this percentage

velocity_min: 700.0    ; Minimum velocity test may try
velocity_max: 5000.0  ; Maximum velocity test may try
velocity_accu: 0.05   ; Keep binary searching until the result is within this percentage

derate: 0.8           ; Derate discovered results by this amount

validate_margin: 20      ; Margin for VALIDATE, Defaults to margin
validate_inner_margin: 20.0 ; Margin for VALIDATE inner pattern
validate_iterations: 10     ; Perform VALIDATE pattern this many times

#####################################################################
#   Homing and Gantry Adjustment Routines
#####################################################################

[quad_gantry_level]

##  Gantry Corners for 350mm Build
##  Uncomment for 350mm build
gantry_corners:
   -60,-10
   410,420
##  Probe points
points:
   50,25
   50,275
   300,275
   300,25

#gantry_corners:
#   -70,0 #-60,-10
#   410,410 #410,420

#points: #  Probe points
#   20,20
#   20,310
#   320,310
#   320,10

speed: 200
horizontal_move_z: 4
retries: 7
retry_tolerance: 0.015
max_adjust: 15

