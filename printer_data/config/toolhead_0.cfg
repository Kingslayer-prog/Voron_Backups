# This file contains common pin mappings for the BIGTREETECH EBBCan
# Canbus board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB0/PB1)".
# The "EBB Can" micro-controller will be used to control the components on the nozzle..

# See docs/Config_Reference.md for a description of parameters.
#serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_4C003F000A504D4D35383820-if00

[mcu et0]
canbus_uuid: 5e8c05e29c89 #aa29d0cba991
canbus_interface: can0

[extruder]
step_pin: et0: PD0
dir_pin: !et0: PD1
enable_pin: !et0: PD2
gear_ratio: 50:8
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 22.47 #4.5 #31.416-10tooth #22-8tooth  #8-stock
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: et0: PB13
sensor_type: NTC 100K MGB18-104F39050L32 #Generic 3950
sensor_pin: et0: PA3
control = pid
pid_kp = 23.608
pid_ki = 1.431
pid_kd = 97.381
min_temp: 0
max_temp: 300
max_power: 1.0
min_extrude_temp: 170
pressure_advance: 0.05
pressure_advance_smooth_time: 0.040
max_extrude_cross_section: 5

[tmc2209 extruder]
uart_pin: et0: PA15
run_current: 0.4
hold_current: 0.2
sense_resistor: 0.110
driver_TPOWERDOWN: 20
stealthchop_threshold: 999999

[fan_generic T0_partfan]
pin: et0: PA1
kick_start_time: 0.5
off_below: 0.08

[heater_fan T0_hotend_fan]
pin: et0: PA0
max_power: 1.0
fan_speed: 0.5
kick_start_time: 0
heater: extruder
heater_temp: 80.0

[adxl345 T0]
 cs_pin: et0:PB12
 spi_software_sclk_pin: et0:PB10
 spi_software_mosi_pin: et0:PB11
 spi_software_miso_pin: et0:PB2
 axes_map: x,z,y

[gcode_macro T0]
variable_color: ""
gcode:
  SELECT_TOOL T=0

[tool T0]
tool_number: 0
extruder: extruder
fan: T0_partfan
gcode_x_offset: 0
gcode_y_offset: 0
gcode_z_offset: 0

params_park_x: 3.00 #1.50
params_park_y: -3.0 #1.55
params_park_z: 298.00

params_input_shaper_freq_x: 66.4
params_input_shaper_type_x: 'EI'
params_input_shaper_freq_y: 51.2
params_input_shaper_type_y: 'EI'

[tool_probe T0]
pin: ^et0: PB6
Tool: 0
z_offset: -1.050 #-1.285
speed: 3.0
samples: 5
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.02
samples_tolerance_retries: 3
activate_gcode:
    _TAP_PROBE_ACTIVATE HEATER=extruder

# change the neopixel section name to the tool you are configuring:
# T0, T1, etc.
[neopixel T0_leds] #
pin: et0: PD3
color_order: GRB
chain_count: 3
initial_RED: 1
initial_GREEN: 1
initial_BLUE: 0

# change the gcode_macro section name to the tool you are configuring:
# T0, T1, etc.
[gcode_macro T0]
variable_active: 0 # Must be zero.
variable_color: "" # Leave empty
gcode:
    SELECT_TOOL T=0 # change to the index of the tool. 0, 1, 2, etc.
